name: Psych 0.6.3 Android Build (MaysLastPlay Port)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  buildAndroid:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout
      # ----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # Setup Android NDK r15c (REQUIRED)
      # ----------------------------
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r15c

      # ----------------------------
      # Setup Java 11 (REQUIRED)
      # ----------------------------
      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 11

      # ----------------------------
      # Ensure ANDROID_HOME is set
      # ----------------------------
      - name: Set Android Environment
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      # ----------------------------
      # Setup Haxe 4.2.0 (REQUIRED)
      # ----------------------------
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.0

      # ----------------------------
      # Install Required Haxelib Dependencies
      # ----------------------------
      - name: Install Haxelib Dependencies
        run: |
          haxelib setup ~/haxelib

          # Exact required versions
          haxelib install hxcpp 4.2.1
          haxelib install lime 7.9.0
          haxelib install openfl 9.1.0
          haxelib install flixel 4.11.0
          haxelib install flixel-addons 2.11.0
          haxelib install flixel-ui
          haxelib install flixel-tools
          haxelib install tjson
          haxelib install hxjsonast
          haxelib install hscript
          haxelib install hxcpp-debug-server

          # Required custom forks for this port
          haxelib git hxCodec https://github.com/SPLCoding/hxCodec-but-it-works-xd.git
          haxelib git linc_luajit https://github.com/Sirox228/linc_luajit
          haxelib git extension-androidtools https://github.com/MaysLastPlay77/extension-androidtools

          haxelib list

      # ----------------------------
      # Configure Lime
      # ----------------------------
      - name: Configure Lime
        run: |
          haxelib run lime setup -alias -y

          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

          # Pin versions (VERY IMPORTANT)
          haxelib set lime 7.9.0
          haxelib set openfl 9.1.0
          haxelib set flixel 4.11.0
          haxelib set flixel-addons 2.11.0
          haxelib set hxcpp 4.2.1

      # ----------------------------
      # Build Android
      # ----------------------------
      - name: Build Android Release
        run: |
          haxelib run lime build android \
            -D NO_PRECOMPILED_HEADERS \
            --app-version="4.0.0-${{ github.run_id }}"

      # ----------------------------
      # Upload APK Artifact
      # ----------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: psych-android-build
          path: export/release/android/bin/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
