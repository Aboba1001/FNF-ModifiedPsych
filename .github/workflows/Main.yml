name: Android Build (Psych 0.6.3)

on:
  workflow_dispatch:

env:
  HAXE_VERSION: 4.3.6

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout
      # ----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # Setup Haxe
      # ----------------------------
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      # ----------------------------
      # Install Haxe Libraries
      # ----------------------------
      - name: Install Haxe Libraries
        run: |
          haxelib setup ~/haxelib

          # Core
          haxelib install lime --quiet
          haxelib install openfl --quiet

          # Psych dependencies
          haxelib install flixel --quiet
          haxelib install flixel-addons --quiet
          haxelib install flixel-ui --quiet

          haxelib run lime setup

      # ----------------------------
      # Configure Android
      # ----------------------------
      - name: Configure Android
        env:
          PLAYSTORE_FIREBASE: ${{ secrets.PLAYSTORE_FIREBASE }}
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME_17_X64
          haxelib run lime config ANDROID_SETUP true

          if [ -n "$PLAYSTORE_FIREBASE" ]; then
            printf '%s' "$PLAYSTORE_FIREBASE" > ./setup/google-services.json
          fi

      # ----------------------------
      # Build Release
      # ----------------------------
      - name: Build Android Release
        run: haxelib run lime build android -release

      # ----------------------------
      # Sign APK (Auto-detect)
      # ----------------------------
      - name: Sign APK
        env:
          SIGNING_KEY: ${{ secrets.MIKOLKA_PASSWORD }}
          SIGNING_ALIAS: pslice
          SIGNING_FILE: ${{ secrets.MIKOLKA_KEYSTORE }}
        run: |
          echo "$SIGNING_FILE" | base64 -d > key.keystore

          APK_PATH=$(find export/release/android -name "*-release.apk" | head -n 1)

          echo "Found APK: $APK_PATH"

          BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0

          $BUILD_TOOLS/zipalign -f 4 "$APK_PATH" aligned.apk

          $BUILD_TOOLS/apksigner sign \
            --ks key.keystore \
            --ks-key-alias $SIGNING_ALIAS \
            --ks-pass pass:$SIGNING_KEY \
            --key-pass pass:$SIGNING_KEY \
            aligned.apk

          mv aligned.apk "$APK_PATH"

      # ----------------------------
      # Upload APK
      # ----------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: psych-android-build
          path: export/release/android/**/*.apk
          if-no-files-found: error
